# =============================================================================
# Docker Compose — Production (Mac Studio M4 Max + Cloudflare)
# =============================================================================
#
# Runs on the Mac Studio behind a Cloudflare Tunnel. Frontend is hosted on
# Cloudflare Pages (not in this compose file).
#
# Image source: ghcr.io/opuspopuli/* — built and signed by .github/workflows/
# release.yml on push to main. The Studio NEVER builds locally; it pulls
# pre-built, cosign-signed images and runs them. `${TAG:-latest}` defaults to
# the rolling latest tag; pin to a specific sha-prefixed tag for a hot-fix or
# rollback (e.g. TAG=sha-abc1234 docker compose -f docker-compose-prod.yml ...).
#
# Architecture:
#   - cloudflared: Encrypted tunnel to Cloudflare edge
#   - NestJS microservices: API Gateway + 4 subgraph services + 3 workers
#   - Local PostgreSQL: AI scratch data (manifests, pipeline state, prompts)
#   - Redis: BullMQ queue + caching
#   - Observability: Prometheus + Loki + Grafana
#   - Ollama: Runs NATIVELY on macOS (not Docker) for Metal GPU access
#
# Configure via .env.production (see .env.production.example). Runtime secrets
# (RESEND_API_KEY, R2_*, FEC_API_KEY) come from the local Supabase Vault via
# the hydration path in apps/backend/src/common/preflight.ts.
#
# Usage:
#   docker compose -f docker-compose-prod.yml pull            # fetch new images
#   docker compose -f docker-compose-prod.yml up -d           # start the stack
#   docker compose -f docker-compose-prod.yml down            # stop (volumes kept)
#   docker compose -f docker-compose-prod.yml logs -f api
#
# =============================================================================

x-backend-env: &backend-env
  # NODE_ENV: defaults to production for Tunnel-exposed deployments. In
  # production mode the backend's CORS validator REQUIRES https:// origins
  # — so `--local-only` Studio operators (no HTTPS server) must override
  # with `NODE_ENV=development` in their shell env before `./bin/op-compose
  # up`. The op-compose wrapper will eventually bake this in for
  # bootstrap --local-only runs; tracked in a follow-up.
  NODE_ENV: ${NODE_ENV:-production}
  PROJECT: opuspopuli
  VERSION: ${VERSION:-1.0.0}
  # Supabase access. SUPABASE_URL is the IN-NETWORK address — backend
  # services call kong via the docker network alias regardless of what
  # public hostname the operator's Cloudflare Tunnel exposes. Without
  # this hardcoded, `${SUPABASE_URL}` from the host env would become
  # `http://localhost:8000` inside the container (where localhost is
  # the container itself) and every Vault/auth/storage call would
  # ECONNREFUSED. The operator's public URL flows separately via
  # SUPABASE_PUBLIC_URL (used by gotrue + studio for browser-facing
  # callback URLs).
  SUPABASE_URL: http://kong:8000
  SUPABASE_PUBLIC_URL: ${SUPABASE_URL:-http://localhost:8000}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  # Local PostgreSQL (AI scratch data). DB name aligned with upstream
  # supabase convention (`postgres`) — the bundled init scripts hardcode
  # `ALTER DATABASE postgres SET …` for the JWT_SECRET / JWT_EXP GUCs that
  # postgrest reads. Using a non-`postgres` DB name silently breaks those.
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
  PRISMA_CONNECTION_LIMIT: ${PRISMA_CONNECTION_LIMIT:-20}
  PRISMA_POOL_TIMEOUT: ${PRISMA_POOL_TIMEOUT:-10}
  RELATIONAL_DB_PROVIDER: postgres
  RELATIONAL_DB_HOST: db
  RELATIONAL_DB_PORT: 5432
  RELATIONAL_DB_USERNAME: postgres
  RELATIONAL_DB_PASSWORD: ${POSTGRES_PASSWORD}
  RELATIONAL_DB_DATABASE: ${POSTGRES_DB:-postgres}
  # Redis
  REDIS_URL: redis://redis:6379
  # Auth & Security
  JWT_SECRET: ${JWT_SECRET}
  AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
  GATEWAY_CLIENT_ID: api-gateway
  # GATEWAY_HMAC_SECRET + API_KEYS are platform-internal HMAC keys used
  # to sign requests between the API Gateway and microservices. Backend
  # config validation rejects empty values. They're not yet Keychain-
  # managed (tracked in #811 — vault-first secrets refactor); fallback
  # defaults below keep the stack bootable for --local-only operators.
  # NEVER deploy with these defaults on a Tunnel-exposed node: change
  # to operator-specific high-entropy values via host env before `up`.
  GATEWAY_HMAC_SECRET: ${GATEWAY_HMAC_SECRET:-local-only-hmac-secret-rotate-before-tunnel-exposure}
  # Outer single quotes are YAML syntax (stripped); the `${VAR:-default}`
  # default falls through as bare JSON. Without the YAML wrapper, the
  # literal single quotes around the inline default ended up in the env
  # value, so the api-gateway's JSON.parse failed and it sent empty
  # HMACs to every microservice ("Invalid X-HMAC-Auth" 401s everywhere).
  API_KEYS: '${API_KEYS:-{"api-gateway":"local-only-hmac-secret-rotate-before-tunnel-exposure"}}'
  # CORS — required in production by the backend's config validator.
  # Default covers the local frontend dev port + the operator's public
  # Supabase URL (whatever was passed to bootstrap). Operators serving
  # a public frontend should override via host env or .env.
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3200,${SUPABASE_URL:-http://localhost:8000}}
  # OpenTelemetry distributed tracing
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
  # Secrets via Supabase Vault. The hydration step in apps/backend/src/common/
  # preflight.ts reads the secrets named in VAULT_BACKED_SECRETS and writes
  # them into process.env before any AppModule is loaded. Vault values
  # overwrite env when the vault secret is present; env values serve as
  # fallback only when the vault secret is absent (used during incremental
  # migration before each secret is seeded in the prod Supabase Cloud vault).
  # Once a secret is seeded in vault, its env passthrough below becomes
  # dead code and can be removed in a follow-up. See
  # docs/guides/secrets-management.md and issues #786 / #792.
  SECRETS_PROVIDER: supabase
  # Email — the backend's Resend client is constructed at module init
  # (not lazily), so an empty RESEND_API_KEY crashes startup with
  # "Missing API key. Pass it to the constructor new Resend('re_123')".
  # The placeholder default lets the stack boot; emails will fail at
  # send-time until the operator seeds a real key in Vault or via env.
  # Same for SMTP_PASS — gotrue's SMTP client is eager too.
  RESEND_API_KEY: ${RESEND_API_KEY:-re_LOCAL_DEV_PLACEHOLDER_emails_fail_until_seeded_in_vault}
  SMTP_HOST: ${SMTP_HOST:-smtp.resend.com}
  SMTP_PORT: ${SMTP_PORT:-465}
  SMTP_USER: ${SMTP_USER:-resend}
  SMTP_PASS: ${SMTP_PASS:-PLACEHOLDER_smtp_pass_emails_fail_until_seeded_in_vault}
  SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-noreply@opuspopuli.org}
  FRONTEND_URL: ${FRONTEND_URL:-https://opuspopuli.org}

x-healthcheck: &healthcheck
  test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel
  #
  # Gated behind the `public` profile so `docker compose up -d` brings up the
  # stack *without* cloudflared by default. Pass `--profile public` to start
  # the tunnel. This lets operators run the node locally (frontend on LAN /
  # Tailscale, no public exposure) without needing a Tunnel token at all,
  # and lets `create-op-node bootstrap --local-only` skip the cloudflared
  # service cleanly. For production deployment, `bootstrap` activates the
  # `public` profile by default.
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: opuspopuli-prod-cloudflared
    profiles: [public]
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  # ---------------------------------------------------------------------------
  # Local PostgreSQL — AI scratch data
  #
  # Uses Supabase's Postgres image because the platform is built around the
  # Supabase ecosystem (auth via GoTrue, secrets via supabase_vault,
  # storage via PostgREST). This image ships ALL the extensions the
  # baseline migration declares:
  #   - pgvector       (knowledge service embeddings)
  #   - PostGIS        (civic geography: addresses, district polygons,
  #                     polling places)
  #   - pgsodium       (the master encryption key the LaunchAgent injects
  #                     as PGSODIUM_ROOT_KEY)
  #   - supabase_vault (operator-rotatable secret storage at the DB layer)
  #   - pg_graphql, pg_jsonschema, pg_cron, pg_net, pgaudit
  #
  # The community pgvector image doesn't ship most of these — first
  # bootstrap of every region fails with `type "geography" does not
  # exist` and a string of extension-missing errors.
  #
  # Pinned to the current pg17 stable. Tag format is
  # `<pg-major>.<pg-minor>.<supabase-build>` — update in lockstep with
  # the upstream self-hosted Supabase release cadence.
  # ---------------------------------------------------------------------------
  db:
    image: supabase/postgres:17.6.1.138
    container_name: opuspopuli-prod-db
    environment:
      # supabase_admin (not postgres) is the BOOTSTRAP SUPERUSER. The image's
      # 10000000000000_demote-postgres.sql migration ALTER ROLE postgres
      # NOSUPERUSER — Postgres refuses to demote the bootstrap superuser, so
      # if POSTGRES_USER=postgres, that migration aborts the init chain.
      # With POSTGRES_USER=supabase_admin, initdb creates supabase_admin as
      # the bootstrap superuser, migrate.sh creates `postgres` as a regular
      # superuser, and the demote migration succeeds.
      POSTGRES_USER: supabase_admin
      # No `:-` fallback on secret values. Hydrated by `create-op-node
      # bootstrap` via launchd setenv (read from macOS Keychain). If the
      # operator's shell predates the LaunchAgent load, compose will
      # hard-fail with "variable is not set" instead of silently coming
      # up with a well-known weak password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run create-op-node bootstrap and reopen your shell}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # Supabase init scripts read these — exported in the launchd session
      # by `create-op-node bootstrap` and also picked up here for explicit
      # values during first-boot DB initialization. `:?` form hard-fails
      # if missing — see POSTGRES_PASSWORD comment above for the rationale.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — run create-op-node bootstrap}
      JWT_EXP: ${JWT_EXPIRY:-3600}
      PGSODIUM_ROOT_KEY: ${PGSODIUM_ROOT_KEY:?PGSODIUM_ROOT_KEY is required — run create-op-node bootstrap}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init-scripts/ subdir: processed by the image's migrate.sh, AS the
      # `postgres` role, after supabase_admin exists. Runs on FIRST boot
      # only (sequenced alphabetically; image's own 00-schema.sql,
      # 00000000000000-initial-schema.sql, etc. interleave with ours).
      - ./supabase/init/sql/00-roles.sql:/docker-entrypoint-initdb.d/init-scripts/01-roles.sql:ro
      - ./supabase/init/sql/01-jwt.sql:/docker-entrypoint-initdb.d/init-scripts/02-jwt.sql:ro
      - ./supabase/init/sql/02-_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:ro
      - ./supabase/init/sql/03-realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:ro
      - ./supabase/init/sql/04-webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/99-webhooks.sql:ro
      # App-required extensions (postgis / pgvector / pg_trgm) — must be
      # installed while postgres is still SUPERUSER (before the bundled
      # demote-postgres migration runs). Sequencing as `04-` keeps it
      # alphabetically before `99-webhooks` so all extension installs are
      # complete before any other init script can depend on them.
      - ./supabase/init/sql/05-app-extensions.sql:/docker-entrypoint-initdb.d/init-scripts/04-app-extensions.sql:ro
      # Bind-mount our env-driven pgsodium getkey script over the image
      # default so the master key survives container recreations (#791).
      - ./supabase/init/pgsodium_getkey_env.sh:/usr/lib/postgresql/bin/pgsodium_getkey.sh:ro
    healthcheck:
      # supabase_admin is the bootstrap superuser (see POSTGRES_USER above).
      # `postgres` doesn't exist until migrate.sh creates it, so probing it
      # would fail-noisy for the first ~second of startup. Explicit `-d`
      # so pg_isready connects to `postgres` instead of trying to connect
      # to a database named after the user (`supabase_admin`, which doesn't
      # exist) — without it, every probe logs FATAL: database
      # "supabase_admin" does not exist into the db's own log.
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Supabase — self-hosted stack
  #
  # The platform's services (knowledge, users, documents) talk to Supabase via
  # @supabase/supabase-js. SUPABASE_URL must resolve to a Kong gateway that
  # routes to gotrue (auth), postgrest (REST), storage-api, postgres-meta,
  # etc. Without this stack, services with AUTH_PROVIDER=supabase have
  # nothing to call into and fail at startup.
  #
  # Trimmed from upstream Supabase's official self-hosted docker-compose:
  # OUT: edge-runtime (we use NestJS), supavisor (single-tenant pool not
  # needed), realtime (Apollo subscriptions cover live updates), analytics/
  # logflare (we use Prometheus + Loki + Grafana from observability/).
  # IN: kong, auth, rest, storage, meta. Studio is optional (public profile).
  # ---------------------------------------------------------------------------

  kong:
    image: kong/kong:3.9.1
    container_name: opuspopuli-prod-kong
    restart: unless-stopped
    # Publish kong on the host so SUPABASE_URL=http://localhost:8000 works
    # for browsers + platform services running outside this compose, and
    # so the Cloudflare Tunnel (cloudflared on the host) can reach it.
    # 8000 = HTTP proxy listener; 8443 = HTTPS proxy listener.
    ports:
      - '${KONG_HTTP_PORT:-8000}:8000/tcp'
      - '${KONG_HTTPS_PORT:-8443}:8443/tcp'
    networks:
      opuspopuli-prod:
        aliases:
          - api-gw
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./supabase/init/kong/kong.yml:/home/kong/temp.yml:ro
      - ./supabase/init/kong/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_NOT_FOUND_TTL: 1
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,ip-restriction,post-function
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_PROXY_ACCESS_LOG: /dev/stdout combined
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required — run create-op-node bootstrap}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required — run create-op-node bootstrap}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:?DASHBOARD_PASSWORD is required — run create-op-node bootstrap}
    entrypoint: ["/bin/sh", "/home/kong/kong-entrypoint.sh"]

  auth:
    image: supabase/gotrue:v2.189.0
    container_name: opuspopuli-prod-auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    networks:
      - opuspopuli-prod
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      # Public URL used in magic-link callback emails — must be what the
      # user's browser can reach (not the in-network kong hostname).
      API_EXTERNAL_URL: ${SUPABASE_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_ISSUER: ${SUPABASE_URL:-http://localhost:8000}/auth/v1
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-supabase-mail}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-2500}
      GOTRUE_SMTP_USER: ${SMTP_USER:-fake_mail_user}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-fake_mail_password}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Opus Populi}

  rest:
    image: postgrest/postgrest:v14.12
    container_name: opuspopuli-prod-rest
    restart: unless-stopped
    # No healthcheck: postgrest ships as a `scratch` image — no shell, no
    # curl/wget/nc, no `postgrest --dump-config` exec context that Docker
    # CMD can reliably invoke. Downstream services depend on this via
    # `service_started` (storage waits for the process to exist, not for
    # a healthcheck). postgrest's own retry logic handles a not-yet-ready
    # database without us needing a Compose-level orchestration signal.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - opuspopuli-prod
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    command: "postgrest"

  storage:
    image: supabase/storage-api:v1.60.4
    container_name: opuspopuli-prod-storage
    restart: unless-stopped
    # Use node (which is definitely in the image — it's a node app) for the
    # healthcheck. `wget` in the alpine variant of storage-api:v1.60.4 fails
    # with "Connection refused" on localhost even when the server is plainly
    # listening on 0.0.0.0:5000 — verified externally via kong: `curl
    # http://localhost:8000/storage/v1/bucket` returns 200 OK with the bucket
    # list. The TCP probe below confirms the listener is accepting
    # connections without depending on any specific HTTP endpoint or on
    # wget's libc/SSL stack.
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('net').connect(5000, '127.0.0.1', () => process.exit(0)).on('error', () => process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    networks:
      - opuspopuli-prod
    volumes:
      - storage-data:/var/lib/storage:z
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub

  meta:
    image: supabase/postgres-meta:v0.96.6
    container_name: opuspopuli-prod-meta
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - opuspopuli-prod
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # Optional admin UI — behind `studio` compose profile so it stays down
  # unless explicitly enabled. Useful when you need to inspect tables or
  # tweak RLS during development. Not needed for production traffic.
  studio:
    image: supabase/studio:2026.06.03-sha-0bca601
    container_name: opuspopuli-prod-studio
    profiles: [studio]
    restart: unless-stopped
    depends_on:
      meta:
        condition: service_started
    networks:
      - opuspopuli-prod
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Opus Populi}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-Region Node}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: opuspopuli-prod-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ---------------------------------------------------------------------------
  # Database Migrations
  # ---------------------------------------------------------------------------
  db-migrate:
    image: ghcr.io/opuspopuli/db-migrate:${TAG:-latest}
    container_name: opuspopuli-prod-db-migrate
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    command: ["/usr/local/bin/db-migrate.sh"]
    networks:
      - opuspopuli-prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # NestJS Microservices
  # ---------------------------------------------------------------------------
  users:
    image: ghcr.io/opuspopuli/users:${TAG:-latest}
    container_name: opuspopuli-prod-users
    environment:
      <<: *backend-env
      APPLICATION: users
      DESCRIPTION: Users microservice
      PORT: 8080
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  documents:
    image: ghcr.io/opuspopuli/documents:${TAG:-latest}
    container_name: opuspopuli-prod-documents
    environment:
      <<: *backend-env
      APPLICATION: documents
      DESCRIPTION: Documents microservice
      PORT: 8080
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  knowledge:
    image: ghcr.io/opuspopuli/knowledge:${TAG:-latest}
    container_name: opuspopuli-prod-knowledge
    environment:
      <<: *backend-env
      APPLICATION: knowledge
      DESCRIPTION: Knowledge microservice
      PORT: 8080
      # Ollama runs natively on macOS for Metal GPU acceleration
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:35b}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  region:
    image: ghcr.io/opuspopuli/region:${TAG:-latest}
    container_name: opuspopuli-prod-region
    environment:
      <<: *backend-env
      APPLICATION: region
      DESCRIPTION: Region microservice
      PORT: 8080
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:35b}
      REGION_SYNC_ENABLED: "true"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  region-worker:
    image: ghcr.io/opuspopuli/region-worker:${TAG:-latest}
    container_name: opuspopuli-prod-region-worker
    environment:
      <<: *backend-env
      APPLICATION: region-worker
      DESCRIPTION: Region worker (async job processor)
      PORT: 8080
      REGION_WORKER_PORT: 8080
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:35b}
      REGION_SYNC_ENABLED: "true"
      REGION_SYNC_CRON_ENABLED: "true"
      REGION_SYNC_CRON_VIA_QUEUE: "true"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 6G
        reservations:
          cpus: '0.5'
          memory: 1G

  structural-analysis-worker:
    image: ghcr.io/opuspopuli/structural-analysis-worker:${TAG:-latest}
    container_name: opuspopuli-prod-structural-analysis-worker
    environment:
      <<: *backend-env
      APPLICATION: structural-analysis-worker
      DESCRIPTION: Structural analysis worker (async manifest analysis)
      PORT: 8080
      STRUCTURAL_ANALYSIS_WORKER_PORT: 8080
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:35b}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.25'
          memory: 512M

  llm-rerank-worker:
    image: ghcr.io/opuspopuli/llm-rerank-worker:${TAG:-latest}
    container_name: opuspopuli-prod-llm-rerank-worker
    environment:
      <<: *backend-env
      APPLICATION: llm-rerank-worker
      DESCRIPTION: LLM re-rank worker (personalized feed nightly batch, opuspopuli#745)
      PORT: 8080
      LLM_RERANK_WORKER_PORT: 8080
      LLM_URL: http://host.docker.internal:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:35b}
      PROMPT_SERVICE_URL: ${PROMPT_SERVICE_URL}
      PROMPT_SERVICE_API_KEY: ${PROMPT_SERVICE_API_KEY}
      LLM_RERANK_CRON_ENABLED: ${LLM_RERANK_CRON_ENABLED:-true}
      LLM_RERANK_CRON_PATTERN: ${LLM_RERANK_CRON_PATTERN:-0 3 * * *}
      # Daily token budget per user — when exhausted, the rerank falls
      # back to embedding-only cache rows (no LLM call). Raise for users
      # with deep candidate pools.
      LLM_RERANK_PER_USER_DAILY_TOKEN_CAP: ${LLM_RERANK_PER_USER_DAILY_TOKEN_CAP:-10000}
      # Threshold after which a RUNNING llm_rerank_jobs row is presumed
      # dead and swept to FAILED on worker startup. Default 10 min;
      # raise to accommodate slow Ollama models or large candidate sets.
      LLM_RERANK_JOB_STALE_AGE_MS: ${LLM_RERANK_JOB_STALE_AGE_MS:-600000}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.25'
          memory: 512M

  api:
    image: ghcr.io/opuspopuli/api:${TAG:-latest}
    container_name: opuspopuli-prod-api
    environment:
      <<: *backend-env
      APPLICATION: api
      DESCRIPTION: API Gateway
      PORT: 8080
      MICROSERVICES: '[{"name":"users","url":"http://users:8080/graphql"},{"name":"documents","url":"http://documents:8080/graphql"},{"name":"knowledge","url":"http://knowledge:8080/graphql"},{"name":"region","url":"http://region:8080/graphql"}]'
    ports:
      - "8080:8080"
    depends_on:
      users:
        condition: service_healthy
      documents:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      region:
        condition: service_healthy
    healthcheck: *healthcheck
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: opuspopuli-prod-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/alerts/prometheus-alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  loki:
    image: grafana/loki:3.4.2
    container_name: opuspopuli-prod-loki
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  promtail:
    image: grafana/promtail:3.4.2
    container_name: opuspopuli-prod-promtail
    volumes:
      - ./observability/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M

  tempo:
    image: grafana/tempo:2.7.2
    container_name: opuspopuli-prod-tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/var/tempo
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  grafana:
    image: grafana/grafana:10.4.1
    container_name: opuspopuli-prod-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3101:3000"  # Local access only
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - opuspopuli-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  opuspopuli-prod:
    name: opuspopuli-prod

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
  storage-data: