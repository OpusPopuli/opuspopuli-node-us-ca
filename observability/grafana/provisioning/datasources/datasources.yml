# Grafana Datasource Provisioning
# Auto-configures Prometheus, Loki, and Tempo as datasources
#
# @see https://github.com/OpusPopuli/opuspopuli/issues/213
# @see https://github.com/OpusPopuli/opuspopuli/issues/466

apiVersion: 1

datasources:
  # Prometheus - Metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "10s"
      httpMethod: POST

  # Loki - Logs (with trace correlation)
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"traceId":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"

  # Tempo - Distributed Traces
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        tags: ['service']
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
