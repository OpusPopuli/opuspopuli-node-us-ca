# Grafana Tempo Configuration
# Distributed tracing backend — receives OTLP traces from microservices
#
# @see https://github.com/OpusPopuli/opuspopuli/issues/466

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Reduce resource usage for single-node deployment
query_frontend:
  max_retries: 2

compactor:
  compaction:
    block_retention: 168h  # 7 days
