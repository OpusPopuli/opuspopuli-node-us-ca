# Backup overlay for the opuspopuli stack.
#
# Single env-agnostic compose file used in every environment (local
# dev, UAT, Mac Studio production). Env-specific values flow through
# env vars / .env files — see .env.backup.example for the contract.
#
# Brought up as an overlay alongside whichever app stack is running:
#
#   Local dev:
#     docker compose -f docker-compose.yml \
#                    -f docker-compose-backup.yml \
#                    --env-file .env.backup \
#                    up -d opuspopuli-backup
#
#   UAT:
#     docker compose -f docker-compose-uat.yml \
#                    -f docker-compose-backup.yml \
#                    --env-file .env.backup \
#                    up -d opuspopuli-backup
#
#   Mac Studio production:
#     docker compose -f docker-compose-prod.yml \
#                    -f docker-compose-backup.yml \
#                    --env-file .env.backup.prod \
#                    up -d opuspopuli-backup
#
# Ad-hoc commands use the same overlay, swapping `up -d` for `run --rm`:
#
#   Manual backup (works even if the scheduler container is down):
#     docker compose -f docker-compose-uat.yml \
#                    -f docker-compose-backup.yml \
#                    --env-file .env.backup \
#                    run --rm opuspopuli-backup /scripts/backup-db.sh
#
#   Restore (quick — assumes schema matches snapshot):
#     docker compose -f docker-compose-uat.yml \
#                    -f docker-compose-backup.yml \
#                    --env-file .env.backup \
#                    run --rm opuspopuli-backup \
#                    /scripts/restore-db.sh --quick \
#                    /backups/opuspopuli-db-<sha>-<ts>.dump.gz
#
# See docs/guides/backup-recovery.md for the full operator guide.

services:
  opuspopuli-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
      args:
        SUPERCRONIC_VERSION: ${SUPERCRONIC_VERSION:-v0.2.31}
    container_name: opuspopuli-backup
    depends_on:
      opuspopuli-db:
        condition: service_healthy
    environment:
      # DB connection — defaults match opuspopuli-db across all envs.
      PGHOST: ${BACKUP_PGHOST:-opuspopuli-db}
      # PGUSER: the everyday role for --quick restores and pg_dump.
      PGUSER: ${BACKUP_PGUSER:-postgres}
      # No well-known fallback: prod hard-fails on an unset password (it
      # mirrors docker-compose-prod.yml's policy). A default of `postgres`
      # here would silently paper over a misconfigured secret and connect
      # with the well-known password.
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.backup.example}
      PGDATABASE: ${BACKUP_PGDATABASE:-postgres}
      # Superuser role used by restore-db.sh --full for the drop/create +
      # CREATE EXTENSION DDL that a demoted `postgres` (NOSUPERUSER on the
      # supabase/postgres image) can't run. Same password as PGPASSWORD.
      BACKUP_SUPERUSER: ${BACKUP_SUPERUSER:-supabase_admin}
      # JWT GUCs re-applied by restore-db.sh --full after DROP+CREATE DATABASE
      # (a single-DB pg_dump does NOT capture `ALTER DATABASE ... SET`, and
      # the supabase init scripts only run on first boot). Without these,
      # postgrest auth silently breaks post-restore.
      # Optional passthrough (NOT `:?`): only restore-db.sh --full needs it,
      # and that path preflight-checks it itself. Making it required here
      # would couple the nightly backup service's startup to a var it never
      # uses — a missing JWT_SECRET would silently stop backups. On a real
      # node the op-compose wrapper always exports it.
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXP: ${JWT_EXP:-3600}
      # Prompt-service DB backup (backup-prompts-db.sh, crontab 03:10).
      # Optional — the script skips cleanly when opuspopuli-prompts-db is
      # unreachable (overlay not active). When the prompt-service overlay
      # IS running, PROMPTS_DB_PASSWORD must be set so the prompts snapshot
      # can authenticate as supabase_admin. Defaults below match
      # docker-compose-prompt-service.yml.
      PROMPTS_DB_PASSWORD: ${PROMPTS_DB_PASSWORD:-}
      PROMPTS_PGHOST: ${PROMPTS_PGHOST:-opuspopuli-prompts-db}
      PROMPTS_PGUSER: ${PROMPTS_PGUSER:-supabase_admin}
      PROMPTS_PGDATABASE: ${PROMPTS_PGDATABASE:-prompt_service}
      # Schema version tag baked into snapshot filenames so restore can
      # detect drift between snapshot-time and restore-time code.
      GIT_SHA: ${GIT_SHA:-unknown}
      # Where the container writes snapshots — bind-mounted from host.
      BACKUPS_DIR: /backups
      # How many days of snapshots to retain. Older files are deleted
      # by the daily run after a successful pg_dump.
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
      # Cron timezone — the scheduled hour in BACKUP_SCHEDULE is interpreted
      # in this TZ. supercronic respects the TZ env var.
      TZ: ${TZ:-America/Los_Angeles}
      # Backup schedules (5-field cron). entrypoint.sh renders /crontab from
      # these; defaults preserve the historical 03:00 (main) / 03:10 (prompts)
      # daily runs. create-op-node writes BACKUP_SCHEDULE from --backup-schedule.
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}
      BACKUP_PROMPTS_SCHEDULE: ${BACKUP_PROMPTS_SCHEDULE:-10 3 * * *}
      # If true, ad-hoc runs block waiting for the scheduled run to
      # finish. If false, they fail fast when the lock is held.
      BACKUP_LOCK_WAIT: ${BACKUP_LOCK_WAIT:-true}
    volumes:
      # Host path holding the snapshots. The :? syntax fails the
      # `compose up` command at start time with a clear error if
      # the var isn't set — surfaces operator misconfiguration
      # immediately rather than silently bind-mounting an anonymous
      # volume that would vanish on container teardown.
      - ${BACKUPS_DIR_HOST:?BACKUPS_DIR_HOST must be set — see .env.backup.example}:/backups
      # Scripts bind-mounted read-only from the repo so iteration
      # during development doesn't require a container rebuild.
      # Production deployments can omit this and rely on the baked-in
      # copy from the image (the Dockerfile COPYs the same files).
      - ./backup/scripts:/scripts:ro
    networks:
      - opuspopuli-network
    restart: unless-stopped

# Reuses the existing opuspopuli-network defined by the main compose
# file. Declared as external so this overlay does not create a
# duplicate network when brought up alongside an existing stack.
networks:
  opuspopuli-network:
    external: true
